<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070812">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  html,body{margin:0;height:100%;background:#070812;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
  *{box-sizing:border-box;}
  a{color:inherit;text-decoration:none;}
  .navrow{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:11px;cursor:pointer;margin-bottom:2px;transition:background .15s;}
  .navrow:hover{background:rgba(255,255,255,0.05);}
  .navrow.active{background:rgba(255,255,255,0.08);}
  .rangebtn{padding:6px 12px;border-radius:7px;font:500 11px 'Inter',sans-serif;cursor:pointer;color:rgba(255,255,255,0.4);}
  .rangebtn.active{background:#ffffff1f;color:#f4f4f6;font-weight:600;}
  .remrow:hover{background:rgba(255,255,255,0.05);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes drawLine{from{stroke-dashoffset:1}to{stroke-dashoffset:0}}
  .card{animation:fadeUp .55s ease backwards;transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;}
  .card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.4);}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.14);border-radius:8px;}
  .ttl{font:600 13px 'Inter',sans-serif;color:#f4f4f6;}
  .ttl:hover{color:#a5b4fc;}
  .mut{color:rgba(255,255,255,0.4);}
  .mono{font-family:'JetBrains Mono',monospace;}
  .chartwrap{position:relative;}
  .chartwrap svg{cursor:crosshair;touch-action:none;}
  .charttip{position:absolute;pointer-events:none;display:none;transform:translate(-50%,-100%);background:#0d1122;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:4px 9px;font:600 10.5px 'JetBrains Mono',monospace;color:#f4f4f6;white-space:nowrap;z-index:8;box-shadow:0 4px 14px rgba(0,0,0,0.5);}
  .shell{position:relative;display:flex;width:100vw;min-height:100vh;background:linear-gradient(160deg,#070812 0%,#0b0f20 55%,#0a0d1c 100%);}
  .side{width:236px;flex:none;padding:24px 16px;display:flex;flex-direction:column;gap:4px;border-right:1px solid rgba(255,255,255,0.06);position:sticky;top:0;height:100vh;overflow-y:auto;}
  .main{flex:1;min-width:0;padding:26px 34px 60px;}
  .nav-ic{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none;font-size:15px;}
  .nav-l{font:600 13px 'Inter',sans-serif;color:#f4f4f6;}
  .nav-s{font:400 10.5px 'Inter',sans-serif;color:rgba(255,255,255,0.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:18px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);margin-bottom:14px;}
  @media (max-width:860px){
    .shell{flex-direction:column;}
    .side{width:100%;height:auto;position:sticky;top:0;z-index:20;flex-direction:row;overflow-x:auto;gap:6px;border-right:0;border-bottom:1px solid rgba(255,255,255,0.06);padding:12px;background:rgba(7,8,18,0.9);backdrop-filter:blur(12px);}
    .navrow{flex:0 0 auto;margin-bottom:0;}
    .navrow .nav-s{display:none;}
    .main{padding:20px 16px 60px;}
  }
</style>
</head>
<body>
<div class="shell">
  <aside class="side" id="side"></aside>
  <main class="main" id="main">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div>
        <div id="greet" style="font:700 22px 'Inter',sans-serif;color:#f4f4f6;letter-spacing:-0.3px">Good evening, Saxon</div>
        <div id="todayLabel" class="mut" style="font:400 12px 'Inter',sans-serif;margin-top:2px">—</div>
      </div>
      <div style="display:flex;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:3px" id="rangePills">
        <div class="rangebtn active" data-n="7">7D</div>
        <div class="rangebtn" data-n="14">14D</div>
        <div class="rangebtn" data-n="30">30D</div>
      </div>
    </div>
    <div id="secDayRing"></div>
    <div id="secReminders"></div>
    <div id="secSleep"></div>
    <div id="secStats"></div>
    <div id="secFinance"></div>
    <div id="secHabits"></div>
    <div id="secWorkouts"></div>
    <div id="secCaffeine"></div>
    <div id="secRunning"></div>
  </main>
</div>

<script>
(function () {
  'use strict';
  var URL = 'https://qolajqziujbfsiguaozo.supabase.co';
  var KEY = 'sb_publishable_MJLciRMTTp9K7Qyb_HojdQ_5pqgnX7l';
  var rows = {};
  var rangeDays = 7;
  var MONS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function pad(n){return String(n).padStart(2,'0');}
  function calKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  function todayCal(){return calKey(new Date());}
  function activeDate(){var n=new Date();var d=new Date(n);if(n.getHours()<6)d.setDate(d.getDate()-1);return calKey(d);}
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
  function pull(appKey,storeKey){var d=rows[appKey];if(d&&typeof d==='object'&&Object.prototype.hasOwnProperty.call(d,storeKey))return d[storeKey];try{var v=localStorage.getItem(storeKey);return v==null?null:JSON.parse(v);}catch(e){return null;}}
  function garmin(){return rows['garmin']||null;}
  function money(v){return 'AUD '+Math.round(Number(v)||0).toLocaleString();}

  // ---- generic line/area chart ----
  function chart(values, w, h, pad, stroke, gradId) {
    if (values.length < 2) return { line:'', area:'', pts:[] };
    var max=Math.max.apply(null,values), min=Math.min.apply(null,values), range=(max-min)||1;
    var stepX=(w-2*pad)/(values.length-1);
    var pts=values.map(function(v,i){var x=pad+i*stepX;var y=h-pad-((v-min)/range)*(h-2*pad);return {x:x,y:y,v:v};});
    var line=pts.map(function(p,i){return (i?'L':'M')+p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ');
    var area=line+' L'+(w-pad).toFixed(1)+','+(h-pad)+' L'+pad+','+(h-pad)+' Z';
    return { line:line, area:area, pts:pts };
  }
  function svgLine(id, values, labels, w, h, stroke, grad, unit) {
    var c = chart(values, w, h, 14);
    if (!c.pts.length) return '<div class="mut" style="font-size:12px;padding:20px 0;text-align:center">Not enough data yet.</div>';
    var ptData = c.pts.map(function (p, i) { return { x: +p.x.toFixed(1), y: +p.y.toFixed(1), label: (labels ? labels[i] : ('#' + (i + 1))) + ': ' + p.v + (unit || '') }; });
    var dots = c.pts.map(function (p) { return '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="2.5" fill="' + stroke + '" stroke="#0d1122" stroke-width="1"/>'; }).join('');
    // x-axis: thin the date labels to ~6 evenly-spaced ticks (always incl. first
    // & last) so each point has real context instead of just a bare line.
    var band = (labels && labels.length) ? 18 : 0, total = h + band, axis = '';
    if (band) {
      var n = c.pts.length, want = Math.min(n, 6), seen = {};
      for (var t = 0; t < want; t++) {
        var i = Math.round(t * (n - 1) / (want - 1));
        if (seen[i]) continue; seen[i] = 1;
        var p = c.pts[i], anchor = i === 0 ? 'start' : (i === n - 1 ? 'end' : 'middle');
        axis += '<text x="' + p.x.toFixed(1) + '" y="' + (h + 12) + '" fill="rgba(255,255,255,0.42)" font-family="\'JetBrains Mono\',monospace" font-size="9" text-anchor="' + anchor + '">' + esc(labels[i]) + '</text>';
      }
    }
    return '<div class="chartwrap"><svg width="100%" height="' + total + '" viewBox="0 0 ' + w + ' ' + total + '" data-w="' + w + '" data-h="' + total + '" data-pts=\'' + JSON.stringify(ptData) + '\' style="overflow:visible;margin-top:4px">' +
      '<defs><linearGradient id="' + grad + '" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + stroke + '" stop-opacity="0.45"/><stop offset="100%" stop-color="' + stroke + '" stop-opacity="0"/></linearGradient></defs>' +
      '<path d="' + c.area + '" fill="url(#' + grad + ')"/>' +
      '<path d="' + c.line + '" fill="none" stroke="' + stroke + '" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>' +
      dots + '<circle class="chart-hi" r="4.5" fill="none" stroke="#fff" stroke-width="1.5" style="display:none"/>' +
      axis + '</svg><div class="charttip"></div></div>';
  }

  function attachChartHovers() {
    Array.prototype.forEach.call(document.querySelectorAll('.chartwrap'), function (wrap) {
      var svg = wrap.querySelector('svg'); if (!svg || svg._wired) return; svg._wired = true;
      var tip = wrap.querySelector('.charttip'), hi = svg.querySelector('.chart-hi');
      var W = +svg.getAttribute('data-w'), H = +svg.getAttribute('data-h'), pts;
      try { pts = JSON.parse(svg.getAttribute('data-pts') || '[]'); } catch (e) { pts = []; }
      if (!pts.length) return;
      function move(ev) {
        var r = svg.getBoundingClientRect();
        var cx = ((ev.touches ? ev.touches[0].clientX : ev.clientX) - r.left) / r.width * W;
        var best = pts[0]; pts.forEach(function (p) { if (Math.abs(p.x - cx) < Math.abs(best.x - cx)) best = p; });
        if (hi) { hi.setAttribute('cx', best.x); hi.setAttribute('cy', best.y); hi.style.display = ''; }
        tip.style.display = 'block'; tip.style.left = (best.x / W * r.width) + 'px'; tip.style.top = (best.y / H * r.height - 8) + 'px'; tip.textContent = best.label;
      }
      function leave() { tip.style.display = 'none'; if (hi) hi.style.display = 'none'; }
      svg.addEventListener('mousemove', move);
      svg.addEventListener('mouseleave', leave);
      svg.addEventListener('touchstart', function (e) { move(e); e.preventDefault(); }, { passive: false });
      svg.addEventListener('touchmove', function (e) { move(e); e.preventDefault(); }, { passive: false });
      svg.addEventListener('touchend', leave);
    });
  }

  // ================= SIDEBAR =================
  function renderSide() {
    var cats = [
      { l:'Overview', s:'Top of page', ic:'▦', col:'#f4f4f6', href:'index.html' },
      { l:'Main', s:'Goals & daily plan', ic:'📋', col:'#34d399', href:'main.html' },
      { l:'Fitness', s:'Workouts & photos', ic:'💪', col:'#f59e0b', href:'gym.html' },
      { l:'Health', s:'Supplements & sleep', ic:'💊', col:'#fb7185', href:'health.html' },
      { l:'Water', s:'Hydration', ic:'💧', col:'#38bdf8', href:'po-water.html' },
      { l:'Finance', s:'Money & net worth', ic:'📊', col:'#eab308', href:'finance.html' },
      { l:'Caffeine', s:'Intake & timing', ic:'☕', col:'#a78bfa', href:'caffeine.html' },
      { l:'Habits', s:'Streaks', ic:'🔥', col:'#fb923c', href:'habits.html' },
      { l:'Running', s:'Coach & paces', ic:'🏃', col:'#f97316', href:'running.html' },
      { l:'Calories', s:'Food & macros', ic:'🍎', col:'#ef4444', href:'calories.html' }
    ];
    // Each item NAVIGATES to its real page (where you actually log things).
    document.getElementById('side').innerHTML = cats.map(function (c, i) {
      var isOv = i === 0;
      var icHtml = isOv
        ? '<div class="nav-ic" style="background:rgba(255,255,255,0.08);color:#f4f4f6">▦</div>'
        : '<div class="nav-ic" style="background:' + c.col + '22;border:1px solid ' + c.col + '33;color:' + c.col + '">' + c.ic + '</div>';
      return '<a class="navrow' + (isOv ? ' active' : '') + '" href="' + c.href + '">' + icHtml +
        '<div style="min-width:0"><div class="nav-l">' + c.l + '</div><div class="nav-s">' + c.s + '</div></div></a>';
    }).join('');
  }

  // ================= HEADER =================
  function renderHeader() {
    var h = new Date().getHours();
    document.getElementById('greet').textContent = (h < 12 ? 'Good morning, ' : h < 18 ? 'Good afternoon, ' : 'Good evening, ') + 'Saxon';
    var d = new Date();
    document.getElementById('todayLabel').textContent = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) + ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  // ================= DAY PROGRESS (compact version of Main's ring) =================
  function fmtRemain(mins) { mins = Math.max(0, Math.round(mins)); var h = Math.floor(mins / 60), m = mins % 60; return h > 0 ? (h + 'h ' + m + 'm') : (m + 'm'); }
  function fmtClock(d) { var h = d.getHours(), ap = h < 12 ? 'AM' : 'PM', h12 = h % 12 || 12; return h12 + ':' + pad(d.getMinutes()) + ' ' + ap; }
  function renderDayRing() {
    var WAKE = 5, SLEEP = 21, now = new Date();
    var hrs = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
    var r = 26, circ = 2 * Math.PI * r;
    var pct, col, big, phase, status, remaining;
    if (hrs < WAKE) {
      pct = 0; col = 'rgba(255,255,255,0.25)'; big = '—'; phase = 'SLEEPING'; status = '😴 Still sleeping';
      remaining = fmtRemain((WAKE - hrs) * 60) + ' until wake-up';
    } else if (hrs >= SLEEP) {
      pct = 100; col = '#fb7185'; big = '100%'; phase = 'PAST BEDTIME'; status = '⚠️ Past bedtime'; remaining = 'Sleep!';
    } else {
      pct = (hrs - WAKE) / (SLEEP - WAKE) * 100; big = Math.floor(pct) + '%';
      col = pct < 50 ? '#34d399' : pct < 80 ? '#facc15' : '#fb7185';
      if (pct < 25) { phase = 'MORNING'; status = '☀️ Morning — fresh start'; }
      else if (pct < 50) { phase = 'MIDDAY'; status = '⚡ Midday — keep moving'; }
      else if (pct < 75) { phase = 'AFTERNOON'; status = '🔥 Afternoon — push it'; }
      else if (pct < 90) { phase = 'EVENING'; status = '⏳ Evening — wrap up'; }
      else { phase = 'BEDTIME'; status = '🌙 Bedtime soon'; }
      remaining = fmtRemain((SLEEP - hrs) * 60) + ' awake left';
    }
    var off = circ * (1 - pct / 100);
    var svg = '<svg width="60" height="60" viewBox="0 0 62 62" style="flex:none">' +
      '<circle cx="31" cy="31" r="' + r + '" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6"/>' +
      '<circle cx="31" cy="31" r="' + r + '" fill="none" stroke="' + col + '" stroke-width="6" stroke-linecap="round" stroke-dasharray="' + circ.toFixed(1) + '" stroke-dashoffset="' + off.toFixed(1) + '" transform="rotate(-90 31 31)"/>' +
      '<text x="31" y="36" text-anchor="middle" font-family="\'JetBrains Mono\',monospace" font-size="13" font-weight="700" fill="#f4f4f6">' + big + '</text></svg>';
    document.getElementById('secDayRing').innerHTML =
      '<a href="main.html" class="card" style="display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid rgba(226,93,122,0.18)">' +
        svg +
        '<div style="min-width:0;flex:1">' +
          '<div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap"><span style="font:700 13.5px \'Inter\',sans-serif;color:#f4f4f6">' + status + '</span>' +
          '<span class="mono" style="font:600 9.5px \'JetBrains Mono\',monospace;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.05em">' + phase + '</span></div>' +
          '<div class="mut" style="font:400 11.5px \'Inter\',sans-serif;margin-top:3px">' + remaining + ' · <span class="mono">' + fmtClock(now) + '</span> · awake 5:00 AM–9:00 PM</div>' +
        '</div></a>';
  }

  // ================= REMINDERS (pull from all sections) =================
  // ---- write-back + best-effort cloud sync for tickable reminders ----
  var supaClient = null, remoteFetched = false;
  function getSupa() { if (!supaClient && window.supabase) { try { supaClient = window.supabase.createClient(URL, KEY); } catch (e) {} } return supaClient; }
  function persistReminder(appKey, storeKey, val) {
    if (!rows[appKey] || typeof rows[appKey] !== 'object') rows[appKey] = {};
    rows[appKey][storeKey] = val;
    try { localStorage.setItem(storeKey, JSON.stringify(val)); } catch (e) {}
    // Only push once we hold a real remote snapshot, so a partial write can't
    // clobber keys we haven't fetched yet. Sub-pages' own sync fills the gap otherwise.
    if (remoteFetched) { var supa = getSupa(); if (supa) { try { supa.from('app_state').upsert({ key: appKey, data: rows[appKey] }, { onConflict: 'key' }).then(function () {}, function () {}); } catch (e) {} } }
  }
  function toggleReminder(row) {
    var kind = row.getAttribute('data-kind');
    if (kind === 'goal') {
      var gkey = row.getAttribute('data-key'), idx = +row.getAttribute('data-idx');
      var arr = pull('goals', gkey) || [];
      if (arr[idx]) { arr[idx].done = !arr[idx].done; persistReminder('goals', gkey, arr); }
    } else if (kind === 'take') {
      var tkey = row.getAttribute('data-key'), id = row.getAttribute('data-id');
      var taken = pull('health', tkey) || {};
      if (taken[id]) delete taken[id]; else taken[id] = Date.now();
      persistReminder('health', tkey, taken);
    } else if (kind === 'habit') {
      var hid = row.getAttribute('data-id');
      var hb = pull('habits', 'habits:v1');
      if (hb) {
        hb.comps = hb.comps || {};
        var comps = hb.comps[hid] || [], t = todayCal();
        if (comps.some(function (c) { return c.date === t; })) comps = comps.filter(function (c) { return c.date !== t; });
        else comps.push({ date: t, hour: new Date().getHours() });
        hb.comps[hid] = comps;
        persistReminder('habits', 'habits:v1', hb);
      }
    } else if (kind === 'workout') {
      var wd = pull('po-coach', 'po_coach_workout_done') || {}, wt = todayCal();
      if (wd[wt]) delete wd[wt]; else wd[wt] = new Date().toISOString();
      persistReminder('po-coach', 'po_coach_workout_done', wd);
    }
    renderReminders();
  }

  // Which training day is today, per the gym's split rotation? Returns the
  // split name (e.g. "Push") or null on a rest day / when it isn't set up.
  function todayWorkout() {
    var pc = pull('po-coach', 'po_coach_v1');
    if (!pc || !Array.isArray(pc.splitRotation) || !pc.splitRotation.length || !pc.splitAnchor || !pc.splitAnchor.date || pc.splitAnchor.index == null) return null;
    var rot = pc.splitRotation, a = new Date(pc.splitAnchor.date), t = new Date();
    a.setHours(0, 0, 0, 0); t.setHours(0, 0, 0, 0);
    var diff = Math.round((t - a) / 86400000);
    var idx = ((pc.splitAnchor.index + diff) % rot.length + rot.length) % rot.length;
    var name = rot[idx];
    return /^rest\b/i.test(name || '') ? null : name;
  }

  function renderReminders() {
    var items = [], ad = activeDate(), td = todayCal();
    // Goals for today (Main)
    (pull('goals', 'goals:' + ad) || []).forEach(function (g, i) { if (g && g.text) items.push({ label: g.text, cat: 'to-do', col: '#34d399', done: !!g.done, kind: 'goal', key: 'goals:' + ad, idx: i }); });
    // Workout for today (Fitness — split rotation, tickable + done-tracked)
    var wk = todayWorkout();
    if (wk) { var wd = pull('po-coach', 'po_coach_workout_done') || {}; items.push({ label: wk + ' day', cat: 'train', col: '#f59e0b', done: !!wd[td], kind: 'workout' }); }
    // Supplements to take (Health)
    var stack = pull('health', 'stack:items') || [], taken = pull('health', 'stack:taken:' + ad) || {};
    stack.forEach(function (it) { if (it && it.name) items.push({ label: it.name, cat: 'take', col: '#fb7185', done: !!taken[it.id], kind: 'take', key: 'stack:taken:' + ad, id: it.id }); });
    // Habits (Habits)
    var hb = pull('habits', 'habits:v1');
    if (hb && hb.habits) { hb.habits.forEach(function (h) { var comps = (hb.comps && hb.comps[h.id]) || []; var doneToday = comps.some(function (c) { return c.date === td; }); items.push({ label: h.name, cat: 'habit', col: '#fb923c', done: doneToday, kind: 'habit', id: h.id }); }); }
    // Water still to drink (Water) — only while short of the daily goal
    var wp = waterProgress();
    if (wp.total && wp.done < wp.total) items.push({ label: 'Water · ' + wp.done + ' of ' + wp.total, cat: 'water', col: '#38bdf8', done: false, kind: 'info' });
    // Calendar events today (Main)
    (pull('goals', 'cal:events') || []).filter(function (e) { return e && e.date === td; }).forEach(function (e) { items.push({ label: e.title, cat: 'event', col: '#818cf8', done: false, kind: 'info' }); });
    // Money moving today (Finance) — subscriptions renewing + orders arriving
    (pull('finance', 'subs') || []).forEach(function (s) { if (s && s.renewal === td) items.push({ label: (s.name || 'Subscription') + ' renews', cat: 'bill', col: '#eab308', done: false, kind: 'info' }); });
    (pull('finance', 'incoming_orders') || []).forEach(function (o) { if (o && o.date === td) items.push({ label: (o.name || 'Order') + ' arrives', cat: 'arriving', col: '#4ade80', done: false, kind: 'info' }); });

    var tickable = function (k) { return k === 'goal' || k === 'take' || k === 'habit' || k === 'workout'; };
    var tasks = items.filter(function (i) { return tickable(i.kind); });

  function waterProgress() {
    var state = pull('water', 'po_water_v1'); if (!state) return { done: 0, total: 0 };

    var wKg = state.weightUnit === 'lb' ? (p.weightKg || 0) / 2.20462 : (p.weightKg || 0);
    var totalMl = wKg * 35 + (p.activityHrsPerWeek || 0) / 7 * 500 + Math.max(0, (state.caffeineMgPerDay || 0) - 200) * 1.5 + (p.sex === 'm' ? 200 : 0) + ((p.age || 0) >= 50 ? 100 : 0);
    var unitVol = state.unit === 'glass' ? (state.glassMl || 250) : state.unit === 'oz' ? 30 : state.unit === 'ml' ? 1 : (state.bottleMl || 500);
    return { done: done, total: Math.max(1, Math.ceil(totalMl / unitVol)) };

  // ================= HABITS =================
  function renderHabits() {
    var hb = pull('habits', 'habits:v1');
    var now = new Date(), mKey = now.getFullYear() + '-' + pad(now.getMonth() + 1);
    var elapsed = now.getDate();
    var cols = ['#34d399', '#38bdf8', '#fb923c', '#a78bfa', '#fb7185', '#facc15'];
    var bars = [], doneSum = 0, totSum = 0;
    if (hb && hb.habits) {
      hb.habits.forEach(function (h, i) {
        var comps = (hb.comps && hb.comps[h.id]) || [];
        var days = {}, firstEver = null;
        comps.forEach(function (c) {
          var cd = c.date || '';
          if (cd.slice(0, 7) === mKey) days[cd] = 1;
          if (cd && (!firstEver || cd < firstEver)) firstEver = cd;
        });
        var cnt = Object.keys(days).length;
        // Only score against days the habit has existed this month, so a habit
        // added mid-month isn't counted as "missed" for days before it existed.
        var startRef = (h.created && h.created.slice(0, 7) === mKey) ? h.created
                     : (firstEver && firstEver.slice(0, 7) === mKey) ? firstEver : null;
        var denom = Math.max(1, startRef ? (elapsed - parseInt(startRef.slice(8, 10), 10) + 1) : elapsed);
        doneSum += cnt; totSum += denom;
        bars.push({ label: h.name, count: cnt, total: denom, pct: Math.round(cnt / denom * 100), col: cols[i % cols.length] });
      });
    }
    var overall = totSum ? Math.round(doneSum / totSum * 100) : 0;
    var circ = 2 * Math.PI * 40, off = circ - overall / 100 * circ;

    var logs = pull('caffeine', 'caf:logs') || [];
    var vals = [], labels = [], now = new Date();
    for (var i = 13; i >= 0; i--) { var d = new Date(now); d.setDate(d.getDate() - i); var k = calKey(d); var mg = logs.filter(function (l) { return l.time && calKey(new Date(l.time)) === k; }).reduce(function (a, l) { return a + (l.mg || 0); }, 0); vals.push(Math.round(mg)); labels.push((k).slice(5)); }
    var avg = Math.round(vals.reduce(function (a, b) { return a + b; }, 0) / (vals.length || 1)), peak = Math.max.apply(null, vals.concat([0]));
    document.getElementById('secCaffeine').innerHTML =
      '<div id="anchCaffeine" class="card" style="border:1px solid rgba(167,139,250,0.18);padding:16px 18px;animation-delay:.47s">' +
        '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px"><a href="caffeine.html" class="ttl">Caffeine · last 14 days (mg)</a>' +
        '<div style="display:flex;gap:14px"><span class="mono" style="font:600 11px \'JetBrains Mono\',monospace;color:#c4b5fd">avg ' + avg + 'mg</span><span class="mono mut" style="font:600 11px \'JetBrains Mono\',monospace">peak ' + peak + 'mg</span></div></div>' +
        svgLine('caf', vals, labels, 560, 120, '#c4b5fd', 'gradCaf', 'mg') + '</div>';
  }

  // ================= RUNNING (weekly distance from Garmin runs) =================
  function renderRunning() {
    var g = garmin();
    var runs = ((g && g.activities) || []).filter(function (a) { return a && (a.type || '').toLowerCase().indexOf('run') !== -1 && a.distance_m; });
    // group by ISO week over the last 12 weeks
    var now = new Date(), weeks = [];
    for (var wk = 11; wk >= 0; wk--) {
      var end = new Date(now); end.setDate(end.getDate() - wk * 7); var startW = new Date(end); startW.setDate(end.getDate() - 6);
      var km = runs.filter(function (r) { var t = new Date((r.start || '').replace(' ', 'T')).getTime(); return t >= startW.getTime() && t <= end.getTime(); }).reduce(function (a, r) { return a + r.distance_m / 1000; }, 0);
      weeks.push({ km: Math.round(km * 10) / 10, label: MONS[end.getMonth()] + ' ' + end.getDate() });
    }
    var vals = weeks.map(function (w) { return w.km; }), labels = weeks.map(function (w) { return w.label; });
    var total = Math.round(vals.reduce(function (a, b) { return a + b; }, 0));
    document.getElementById('secRunning').innerHTML =
      '<div id="anchRunning" class="card" style="border:1px solid rgba(249,115,22,0.18);animation-delay:.51s">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><a href="running.html" class="ttl" style="font-size:14px">Running · weekly km</a><div class="mono" style="font:600 12px \'JetBrains Mono\',monospace;color:#fb923c">' + total + ' km / 12 wks</div></div>' +
        svgLine('run', vals, labels, 560, 190, '#fb923c', 'gradRun', ' km') + '</div>';
  }

  function renderAll() { renderHeader(); renderDayRing(); renderReminders(); renderSleep(); renderStats(); renderFinance(); renderHabits(); renderWorkouts(); renderCaffeine(); renderRunning(); attachChartHovers(); }

  document.getElementById('rangePills').addEventListener('click', function (e) {
    var b = e.target.closest('.rangebtn'); if (!b) return;
    rangeDays = +b.getAttribute('data-n');
    Array.prototype.forEach.call(this.querySelectorAll('.rangebtn'), function (x) { x.classList.toggle('active', x === b); });
    renderSleep(); attachChartHovers();
  });

  renderSide();
  renderAll();
  setInterval(renderDayRing, 30000); // keep the day-progress clock/percent live
  document.getElementById('secReminders').addEventListener('click', function (e) {
    var row = e.target.closest('.remrow'); if (!row) return;
    var kind = row.getAttribute('data-kind');
    if (['goal', 'take', 'habit', 'workout'].indexOf(kind) === -1) return; // info rows aren't tickable
    toggleReminder(row);
  });
  (async function () {
    var supa = getSupa();
    if (!supa) return;
    try {
      var res = await supa.from('app_state').select('key,data').in('key', ['goals', 'health', 'water', 'finance', 'calories', 'garmin', 'habits', 'caffeine', 'po-coach']);
      if (res && res.data) { res.data.forEach(function (r) { rows[r.key] = r.data; }); remoteFetched = true; renderAll(); }
    } catch (e) {}
  })();
  window.addEventListener('focus', renderAll);
})();
</script>
</body>
