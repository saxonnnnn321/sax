<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #050506; --text-primary: #FAFAFA; --text-secondary: #B8B6B0; --text-tertiary: #76746E;
  --success: #6BE3A4; --warning: #F2C063; --danger: #FF6B6B; --sky: #7DD3FC; --accent: #6BE3A4;
  --card: rgba(255,255,255,0.04); --line: rgba(255,255,255,0.06);
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; -webkit-text-size-adjust: 100%; min-height: 100vh; }
body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; filter: blur(45px); background: radial-gradient(circle at 86% 8%, rgba(125,211,252,0.10), transparent 40%), radial-gradient(circle at 10% 96%, rgba(107,227,164,0.06), transparent 48%); }
body::after { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px); background-size: 3px 3px; }

.ov-shell { position: relative; z-index: 1; display: flex; min-height: 100vh; }

/* sidebar */
.ov-side { width: 214px; flex-shrink: 0; border-right: 1px solid var(--line); padding: max(20px, env(safe-area-inset-top)) 14px 20px; position: sticky; top: 0; height: 100vh; overflow-y: auto; background: rgba(8,8,10,0.4); backdrop-filter: blur(12px); }
.ov-brand { display: flex; align-items: center; gap: 9px; padding: 6px 10px 18px; }
.ov-brand-dot { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--success), var(--sky)); display: grid; place-items: center; font-size: 14px; }
.ov-brand-t { font-size: 14px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; }
.ov-nav { display: flex; flex-direction: column; gap: 2px; }
.ov-nav a { display: flex; align-items: center; gap: 11px; padding: 10px 11px; border-radius: 10px; text-decoration: none; color: var(--text-secondary); font-size: 13.5px; font-weight: 600; transition: background .15s, color .15s; -webkit-tap-highlight-color: transparent; }
.ov-nav a:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
.ov-nav a.active { background: rgba(125,211,252,0.12); color: #cdecff; }
.ov-nav-ic { width: 22px; text-align: center; font-size: 15px; }
.ov-nav-sub { font-size: 10px; color: var(--text-tertiary); margin: 16px 12px 8px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 700; }

/* main */
.ov-main { flex: 1; min-width: 0; padding: max(26px, env(safe-area-inset-top)) clamp(16px, 3vw, 34px) 60px; }
.ov-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 22px; }
.ov-greet { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; color: var(--text-primary); }
.ov-greet span { background: linear-gradient(180deg,#FFF,#C7C4BC); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.ov-date { font-size: 12.5px; color: var(--text-tertiary); margin-top: 3px; }
.ov-pills { display: flex; gap: 4px; padding: 3px; background: rgba(0,0,0,0.3); border: 1px solid var(--line); border-radius: 10px; }
.ov-pills button { border: 0; background: transparent; color: var(--text-tertiary); font-family: inherit; font-size: 11px; font-weight: 700; padding: 6px 11px; border-radius: 7px; cursor: pointer; }
.ov-pills button.active { background: rgba(125,211,252,0.16); color: #cdecff; }

.card { position: relative; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 20px; margin-bottom: 16px; backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
.card-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
.card-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.card-meta { font-size: 12px; color: var(--text-tertiary); }

/* agenda */
.ag-list { list-style: none; margin: 0; padding: 0; }
.ag-item { display: flex; align-items: center; gap: 12px; padding: 11px 4px; border-top: 1px solid rgba(255,255,255,0.05); }
.ag-item:first-child { border-top: 0; }
.ag-check { width: 18px; height: 18px; border-radius: 6px; border: 1.5px solid rgba(255,255,255,0.2); flex-shrink: 0; display: grid; place-items: center; font-size: 11px; }
.ag-check.done { background: var(--success); border-color: var(--success); color: #06210f; }
.ag-text { flex: 1; min-width: 0; font-size: 14px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ag-item.done .ag-text { color: var(--text-tertiary); text-decoration: line-through; }
.ag-tag { flex-shrink: 0; font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 9px; border-radius: 999px; }
.ag-empty { text-align: center; font-size: 13px; color: var(--text-tertiary); padding: 22px 0; font-style: italic; }

/* sleep chart */
.slp-wrap { position: relative; }
.slp-svg { width: 100%; height: auto; display: block; overflow: visible; touch-action: none; }
.slp-tip { position: absolute; pointer-events: none; display: none; transform: translate(-50%,-100%); background: rgba(10,12,18,0.96); border: 1px solid rgba(125,211,252,0.25); border-radius: 9px; padding: 6px 10px; font-size: 11.5px; color: var(--text-primary); white-space: nowrap; z-index: 6; box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
.slp-tip b { color: var(--sky); }
.slp-axis { display: flex; justify-content: space-between; margin-top: 5px; font-family: var(--mono); font-size: 9px; color: var(--text-tertiary); }

/* stat tiles */
.ov-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
@media (max-width: 620px) { .ov-stats { grid-template-columns: 1fr; } }
.st { }
.st-top { display: flex; align-items: center; justify-content: space-between; }
.st-l { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
.st-ic { font-size: 16px; }
.st-v { margin-top: 12px; font-size: 27px; font-weight: 700; letter-spacing: -0.03em; color: var(--text-primary); line-height: 1; font-variant-numeric: tabular-nums; }
.st-v small { font-size: 13px; color: var(--text-tertiary); font-weight: 600; }
.st-bar { margin-top: 12px; height: 7px; border-radius: 999px; background: rgba(255,255,255,0.07); overflow: hidden; }
.st-bar > div { height: 100%; border-radius: 999px; transition: width .5s ease; }

/* finance strip */
.fin-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
@media (max-width: 620px) { .fin-row { grid-template-columns: 1fr; } }
.fin-b { }
.fin-l { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
.fin-v { margin-top: 9px; font-size: 24px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.fin-s { margin-top: 4px; font-size: 11.5px; color: var(--text-tertiary); }

/* mobile: sidebar becomes a top scroll bar */
@media (max-width: 820px) {
  .ov-shell { flex-direction: column; }
  .ov-side { width: 100%; height: auto; position: sticky; top: 0; z-index: 20; border-right: 0; border-bottom: 1px solid var(--line); padding: max(12px, env(safe-area-inset-top)) 12px 10px; }
  .ov-brand { padding: 2px 6px 12px; }
  .ov-nav { flex-direction: row; overflow-x: auto; gap: 6px; scrollbar-width: none; }
  .ov-nav::-webkit-scrollbar { display: none; }
  .ov-nav a { flex: 0 0 auto; padding: 8px 12px; border-radius: 999px; border: 1px solid var(--line); font-size: 12.5px; }
  .ov-nav-sub { display: none; }
}
</style>
</head>
<body>
<div class="ov-shell">
  <aside class="ov-side">
    <div class="ov-brand"><span class="ov-brand-dot">✦</span><span class="ov-brand-t">Saxon's Dashboard</span></div>
    <nav class="ov-nav">
      <a href="index.html" class="active"><span class="ov-nav-ic">🏠</span>Overview</a>
      <a href="main.html"><span class="ov-nav-ic">📋</span>Main</a>
      <a href="gym.html"><span class="ov-nav-ic">💪</span>Fitness</a>
      <a href="health.html"><span class="ov-nav-ic">💊</span>Health</a>
      <a href="po-water.html"><span class="ov-nav-ic">💧</span>Water</a>
      <a href="finance.html"><span class="ov-nav-ic">📊</span>Finance</a>
      <a href="caffeine.html"><span class="ov-nav-ic">☕</span>Caffeine</a>
      <a href="running.html"><span class="ov-nav-ic">🏃</span>Running</a>
      <a href="habits.html"><span class="ov-nav-ic">🔥</span>Habits</a>
      <a href="calories.html"><span class="ov-nav-ic">🍎</span>Calories</a>
    </nav>
  </aside>

  <main class="ov-main">
    <div class="ov-head">
      <div>
        <div class="ov-greet" id="ovGreet">Hello, <span>Saxon</span></div>
        <div class="ov-date" id="ovDate">—</div>
      </div>
      <div class="ov-pills" id="ovPills">
        <button data-n="7" class="active">7 nights</button>
        <button data-n="14">14 nights</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><span class="card-title">Today — everything due</span><span class="card-meta" id="ovAgMeta"></span></div>
      <ul class="ag-list" id="ovAgenda"><li class="ag-empty">Loading…</li></ul>
    </div>

    <div class="card">
      <div class="card-head"><span class="card-title">Sleep score</span><span class="card-meta" id="ovSlpDelta"></span></div>
      <div class="slp-wrap"><svg class="slp-svg" id="ovSlpSvg" viewBox="0 0 720 200"></svg><div class="slp-tip" id="ovSlpTip"></div></div>
      <div class="slp-axis" id="ovSlpAxis"></div>
    </div>

    <div class="ov-stats" id="ovStats"></div>

    <div class="card">
      <div class="card-head"><span class="card-title">Money</span><span class="card-meta">tap Finance to manage</span></div>
      <div class="fin-row" id="ovFin"></div>
    </div>
  </main>
</div>

<script>
(function () {
  'use strict';
  var URL = 'https://qolajqziujbfsiguaozo.supabase.co';
  var KEY = 'sb_publishable_MJLciRMTTp9K7Qyb_HojdQ_5pqgnX7l';
  var MONS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var rows = {};        // Supabase app_state rows: key -> data
  var sleepWindow = 7;

  function pad(n) { return String(n).padStart(2, '0'); }
  function calKey(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
  function todayCal() { return calKey(new Date()); }
  function activeDate() { var n = new Date(); var d = new Date(n); if (n.getHours() < 6) d.setDate(d.getDate() - 1); return calKey(d); }
  function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // read a synced localStorage key from the fetched row, else local cache
  function pull(appKey, storeKey) {
    var d = rows[appKey];
    if (d && typeof d === 'object' && Object.prototype.hasOwnProperty.call(d, storeKey)) return d[storeKey];
    try { var v = localStorage.getItem(storeKey); return v == null ? null : JSON.parse(v); } catch (e) { return null; }
  }
  function garmin() { return rows['garmin'] || null; }
  function money(v, cur) { return (cur || 'CHF') + ' ' + Math.round(Number(v) || 0).toLocaleString(); }

  // water done/total (ported from the water tracker's model)
  function waterProgress() {
    var state = pull('health', 'po_water_v1');
    if (!state) return { done: 0, total: 0 };
    var done = (state.logs || {})[todayCal()] || 0;
    var p = state.profile || { weightKg: 75 };
    var wKg = state.weightUnit === 'lb' ? (p.weightKg || 0) / 2.20462 : (p.weightKg || 0);
    var base = wKg * 35, exercise = (p.activityHrsPerWeek || 0) / 7 * 500;
    var caffeine = Math.max(0, (state.caffeineMgPerDay || 0) - 200) * 1.5;
    var subs = (state.substances || []).reduce(function (s, x) { var dose = (x && x.dose != null ? x.dose : (x && x.defaultDose)) || 0; return s + Math.max(0, dose * ((x && x.mlPerUnit) || 0)); }, 0);
    var adjust = 0; if (p.sex === 'm') adjust += 200; if ((p.age || 0) >= 50) adjust += 100;
    var totalMl = base + exercise + caffeine + subs + adjust;
    var unitVol = state.unit === 'glass' ? (state.glassMl || 250) : state.unit === 'oz' ? 30 : state.unit === 'ml' ? 1 : (state.bottleMl || 500);
    return { done: done, total: Math.max(1, Math.ceil(totalMl / unitVol)) };
  }

  function monthlyEquivalent(it) { var a = Number(it.amount) || 0; if (it.period === 'yearly') return a / 12; if (it.period === 'weekly') return a * 4.345; return a; }

  // ---------------- render ----------------
  function renderHead() {
    var h = new Date().getHours();
    document.getElementById('ovGreet').innerHTML = (h < 12 ? 'Good morning, ' : h < 18 ? 'Good afternoon, ' : 'Good evening, ') + '<span>Saxon</span>';
    var d = new Date();
    document.getElementById('ovDate').textContent = DAYS[d.getDay()] + ', ' + MONS[d.getMonth()] + ' ' + d.getDate();
  }

  function renderAgenda() {
    var items = [];
    var goals = pull('goals', 'goals:' + activeDate()) || [];
    goals.forEach(function (g) { if (g && g.text) items.push({ text: g.text, done: !!g.done, tag: 'Goal', col: '#6BE3A4' }); });
    var events = (pull('goals', 'cal:events') || []).filter(function (e) { return e && e.date === todayCal(); });
    events.forEach(function (e) { items.push({ text: e.title, done: false, tag: 'Plan', col: '#F2C063' }); });
    var stackItems = pull('health', 'stack:items') || [];
    var taken = pull('health', 'stack:taken:' + activeDate()) || {};
    stackItems.forEach(function (it) { if (it && it.name) items.push({ text: it.name, done: !!taken[it.id], tag: 'Take', col: '#A7F3D0' }); });

    var doneN = items.filter(function (i) { return i.done; }).length;
    document.getElementById('ovAgMeta').textContent = items.length ? (doneN + '/' + items.length + ' done') : '';
    var ul = document.getElementById('ovAgenda');
    if (!items.length) { ul.innerHTML = '<li class="ag-empty">Nothing due today. Add goals on Main, or events in the calendar.</li>'; return; }
    // pending first, done last
    items.sort(function (a, b) { return (a.done ? 1 : 0) - (b.done ? 1 : 0); });
    ul.innerHTML = items.map(function (i) {
      return '<li class="ag-item' + (i.done ? ' done' : '') + '">' +
        '<span class="ag-check' + (i.done ? ' done' : '') + '">' + (i.done ? '✓' : '') + '</span>' +
        '<span class="ag-text">' + esc(i.text) + '</span>' +
        '<span class="ag-tag" style="color:' + i.col + ';background:' + i.col + '22">' + i.tag + '</span></li>';
    }).join('');
  }

  function renderSleep() {
    var g = garmin();
    var hist = (g && Array.isArray(g.sleep_history)) ? g.sleep_history.filter(function (s) { return s && s.hours; }) : [];
    hist = hist.slice(-sleepWindow);
    var svg = document.getElementById('ovSlpSvg'), axis = document.getElementById('ovSlpAxis'), tipD = document.getElementById('ovSlpDelta');
    if (hist.length < 2) { svg.innerHTML = ''; axis.innerHTML = ''; tipD.textContent = g ? 'not enough nights yet' : 'connect Garmin'; return; }
    var W = 720, H = 200, PAD = 12;
    var useScore = hist.some(function (s) { return s.score != null; });
    function val(s) { return useScore ? (s.score != null ? s.score : s.hours / 8 * 100) : s.hours; }
    var maxV = useScore ? 100 : Math.max(10, Math.max.apply(null, hist.map(function (s) { return s.hours; })));
    function X(i) { return PAD + i / (hist.length - 1) * (W - 2 * PAD); }
    function Y(v) { return H - 10 - clamp(v / maxV, 0, 1) * (H - 24); }
    var pts = hist.map(function (s, i) { return { x: X(i), y: Y(val(s)), s: s }; });
    var line = pts.map(function (p, i) { return (i ? 'L' : 'M') + p.x.toFixed(1) + ',' + p.y.toFixed(1); }).join(' ');
    var area = line + ' L' + X(hist.length - 1).toFixed(1) + ',' + H + ' L' + X(0).toFixed(1) + ',' + H + ' Z';
    var dots = pts.map(function (p) { return '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="3" fill="#0a0a0b" stroke="#7DD3FC" stroke-width="2"/>'; }).join('');
    svg.innerHTML =
      '<path d="' + area + '" fill="rgba(125,211,252,0.12)"/>' +
      '<path d="' + line + '" fill="none" stroke="#7DD3FC" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" style="filter:drop-shadow(0 0 6px rgba(125,211,252,0.5))"/>' +
      dots + '<circle id="ovSlpHi" r="6" fill="none" stroke="#fff" stroke-width="2" style="display:none"/>';
    axis.innerHTML = '<span>' + (hist[0].date || '').slice(5) + '</span><span>' + (hist[hist.length - 1].date || '').slice(5) + '</span>';
    var last = val(hist[hist.length - 1]), prev = val(hist[hist.length - 2]), delta = Math.round(last - prev);
    tipD.textContent = (delta >= 0 ? '▲ +' : '▼ ') + Math.abs(delta) + (useScore ? ' pts' : 'h') + ' vs last';
    tipD.style.color = delta >= 0 ? '#6BE3A4' : '#F2C063';
    // hover
    var tip = document.getElementById('ovSlpTip');
    function move(ev) { var hi = document.getElementById('ovSlpHi'); var r = svg.getBoundingClientRect(); var vx = ((ev.touches ? ev.touches[0].clientX : ev.clientX) - r.left) / r.width * W; var best = pts[0]; pts.forEach(function (p) { if (Math.abs(p.x - vx) < Math.abs(best.x - vx)) best = p; }); if (hi) { hi.setAttribute('cx', best.x); hi.setAttribute('cy', best.y); hi.style.display = ''; } tip.style.display = 'block'; tip.style.left = (best.x / W * r.width) + 'px'; tip.style.top = (best.y / H * r.height - 6) + 'px'; tip.innerHTML = '<b>' + best.s.hours + 'h</b>' + (best.s.score != null ? ' · score ' + best.s.score : '') + ' <small style="color:var(--text-tertiary)">' + (best.s.date || '').slice(5) + '</small>'; }
    function leave() { tip.style.display = 'none'; var hi = document.getElementById('ovSlpHi'); if (hi) hi.style.display = 'none'; }
    svg.onmousemove = move; svg.onmouseleave = leave; svg.ontouchstart = function (e) { move(e); e.preventDefault(); }; svg.ontouchmove = function (e) { move(e); e.preventDefault(); }; svg.ontouchend = leave;
  }

  function renderStats() {
    var g = garmin();
    // steps
    var steps = g && g.steps != null ? g.steps : null, sGoal = (g && g.steps_goal) || 8000;
    // calories
    var calLog = pull('calories', 'cal:log') || [], calSet = pull('calories', 'cal:settings') || {};
    var kcal = calLog.filter(function (l) { return l && l.date === todayCal(); }).reduce(function (a, l) { return a + (l.kcal || 0); }, 0);
    var cGoal = calSet.goal || 2200;
    // water
    var w = waterProgress();
    var stats = [
      { l: 'Steps', ic: '👟', v: steps != null ? Number(steps).toLocaleString() : '—', sub: null, pct: steps != null ? steps / sGoal * 100 : 0, col: '#7DD3FC' },
      { l: 'Calories', ic: '🍎', v: Math.round(kcal), sv: ' / ' + cGoal, pct: kcal / cGoal * 100, col: '#FB7A50' },
      { l: 'Water', ic: '💧', v: w.done, sv: ' / ' + w.total, pct: w.total ? w.done / w.total * 100 : 0, col: '#60A5FA' }
    ];
    document.getElementById('ovStats').innerHTML = stats.map(function (s) {
      return '<div class="card st"><div class="st-top"><span class="st-l">' + s.l + '</span><span class="st-ic">' + s.ic + '</span></div>' +
        '<div class="st-v">' + s.v + (s.sv ? '<small>' + s.sv + '</small>' : '') + '</div>' +
        '<div class="st-bar"><div style="width:' + clamp(s.pct, 0, 100) + '%;background:' + s.col + '"></div></div></div>';
    }).join('');
  }

  function renderFinance() {
    var hist = pull('finance', 'nw:history') || [];
    var nw = hist.length ? (hist[hist.length - 1].v || 0) : null;
    var subs = pull('finance', 'subs') || [];
    var monthly = subs.reduce(function (a, it) { return a + monthlyEquivalent(it); }, 0);
    var orders = pull('finance', 'incoming_orders') || [];
    var blocks = [
      { l: 'Net worth', v: nw != null ? money(nw) : '—', s: hist.length ? hist.length + ' snapshots' : 'add assets in Finance' },
      { l: 'Subscriptions', v: money(monthly), s: subs.length + ' active · ' + money(monthly * 12) + '/yr' },
      { l: 'On the way', v: orders.length, s: orders.length === 1 ? 'incoming order' : 'incoming orders' }
    ];
    document.getElementById('ovFin').innerHTML = blocks.map(function (b) {
      return '<div class="fin-b"><div class="fin-l">' + b.l + '</div><div class="fin-v">' + b.v + '</div><div class="fin-s">' + b.s + '</div></div>';
    }).join('');
  }

  function render() { renderHead(); renderAgenda(); renderSleep(); renderStats(); renderFinance(); }

  // range pills -> sleep window
  document.getElementById('ovPills').addEventListener('click', function (e) {
    var b = e.target.closest('button'); if (!b) return;
    sleepWindow = +b.getAttribute('data-n');
    Array.prototype.forEach.call(this.querySelectorAll('button'), function (x) { x.classList.toggle('active', x === b); });
    renderSleep();
  });

  render(); // instant, from local cache

  // pull fresh live data from Supabase, then re-render
  (async function () {
    if (!window.supabase) return;
    try {
      var supa = window.supabase.createClient(URL, KEY);
      var res = await supa.from('app_state').select('key,data').in('key', ['goals', 'health', 'finance', 'calories', 'garmin', 'habits']);
      if (res && res.data) { res.data.forEach(function (r) { rows[r.key] = r.data; }); render(); }
    } catch (e) {}
  })();
  window.addEventListener('focus', render);
})();
</script>
</body>
</html>
