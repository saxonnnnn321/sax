<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Garmin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger:  #FF6B6B;
  --gmn: #22D3EE;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; background: #050506; color: var(--text-secondary);
  font-family: var(--font); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; padding: max(28px, env(safe-area-inset-top)) 20px 60px; }
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%), radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2; animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px); background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0% { transform: translate3d(0,0,0); } 100% { transform: translate3d(-22px, 14px, 0); } }

.page { max-width: 1100px; margin: 0 auto; }
.dash-title {
  margin: 0 0 4px; font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }
.g-sub { margin: 0 0 16px; font-size: 12.5px; color: var(--text-tertiary); }
.g-sub b { color: var(--gmn); font-weight: 700; }

.section { margin-top: 8px; }
.section-title {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary);
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.section-title::before { content: ''; width: 18px; height: 1px; background: var(--text-tertiary); opacity: 0.6; }
.section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }

.gm-card {
  position: relative; background: rgba(255, 255, 255, 0.04); border-radius: 16px; padding: 20px; margin-bottom: 14px;
  backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45); overflow: hidden;
}

/* stat grid */
.g-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.g-stat { background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 15px; }
.g-stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); display: flex; align-items: center; gap: 6px; }
.g-stat-val { margin-top: 8px; font-size: 27px; font-weight: 700; letter-spacing: -0.03em; color: var(--text-primary); line-height: 1; font-variant-numeric: tabular-nums; }
.g-stat-val small { font-size: 14px; color: var(--text-tertiary); font-weight: 600; letter-spacing: 0; }
.g-stat-sub { margin-top: 6px; font-size: 11.5px; color: var(--text-tertiary); }
.g-stat-sub.good { color: var(--success); }
.g-mini { margin-top: 9px; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.07); overflow: hidden; }
.g-mini > div { height: 100%; border-radius: 999px; }

/* sleep stages */
.g-sleep-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.g-sleep-big { font-size: 30px; font-weight: 700; letter-spacing: -0.03em; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.g-sleep-big small { font-size: 15px; color: var(--text-tertiary); font-weight: 600; }
.g-sleep-score { font-size: 13px; font-weight: 700; color: var(--gmn); }
.g-stages { display: flex; height: 16px; border-radius: 6px; overflow: hidden; background: rgba(255,255,255,0.05); }
.g-stages > div { height: 100%; }
.g-stage-deep { background: #5B7CFA; }
.g-stage-rem { background: #A78BFA; }
.g-stage-light { background: #67C8E8; }
.g-legend { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
.g-legend span { font-size: 11px; color: var(--text-secondary); display: inline-flex; align-items: center; gap: 6px; }
.g-dot { width: 9px; height: 9px; border-radius: 3px; }

/* activities */
.g-act-list { list-style: none; margin: 0; padding: 0; }
.g-act { display: flex; align-items: center; gap: 14px; padding: 13px 0; border-top: 1px solid rgba(255,255,255,0.06); }
.g-act:first-child { border-top: 0; }
.g-act-emoji { font-size: 24px; flex-shrink: 0; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: rgba(34,211,238,0.10); border: 1px solid rgba(34,211,238,0.18); border-radius: 11px; }
.g-act-main { flex: 1; min-width: 0; }
.g-act-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.g-act-when { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.g-act-stats { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 6px; font-family: var(--font-mono); font-size: 11.5px; color: var(--text-secondary); }
.g-act-stats b { color: var(--text-primary); font-weight: 700; }
.g-empty { text-align: center; font-size: 12px; font-style: italic; color: var(--text-tertiary); padding: 16px 0; }

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .gm-card { padding: 16px; }
  .g-act-stats { gap: 10px; }
}
</style>
</head>
<body>
<div class="page">
  <h1 class="dash-title">Garmin</h1>
  <p class="g-sub" id="gSub">Loading your Garmin data…</p>

  <div class="section">
    <div class="section-title">Daily snapshot</div>
    <div class="gm-card">
      <div class="g-grid" id="gGrid"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Sleep</div>
    <div class="gm-card" id="gSleepCard">
      <div class="g-empty">No sleep data.</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Recent activities</div>
    <div class="gm-card">
      <ul class="g-act-list" id="gActs"><li class="g-empty">No activities.</li></ul>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';
  var SUPABASE_URL = 'https://qolajqziujbfsiguaozo.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_MJLciRMTTp9K7Qyb_HojdQ_5pqgnX7l';

  var MONS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function num(n) { return (n == null) ? '—' : Number(n).toLocaleString(); }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function fmtDateISO(iso) { // "2026-07-07"
    if (!iso) return '—';
    var p = iso.split('-'); if (p.length < 3) return iso;
    return MONS[parseInt(p[1], 10) - 1] + ' ' + parseInt(p[2], 10);
  }
  function fmtActWhen(s) { // "2026-07-07 18:21:00"
    if (!s) return '';
    var parts = s.split(' '); var d = parts[0].split('-'); var t = (parts[1] || '00:00').split(':');
    var mon = MONS[parseInt(d[1], 10) - 1] + ' ' + parseInt(d[2], 10);
    var hr = parseInt(t[0], 10), mn = t[1] || '00';
    var ap = hr < 12 ? 'AM' : 'PM'; var h12 = hr % 12; if (h12 === 0) h12 = 12;
    return mon + ' · ' + h12 + ':' + mn + ' ' + ap;
  }
  function relTime(iso) {
    if (!iso) return '';
    var t = new Date(iso).getTime(); if (isNaN(t)) return '';
    var mins = Math.round((Date.now() - t) / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + ' min ago';
    var h = Math.round(mins / 60); if (h < 24) return h + ' h ago';
    var d = Math.round(h / 24); return d + ' day' + (d > 1 ? 's' : '') + ' ago';
  }
  function hms(sec) {
    sec = Math.round(sec || 0); var h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    return m + ':' + String(s).padStart(2, '0');
  }
  function pace(dist_m, dur_s) {
    if (!dist_m || !dur_s) return '—';
    var spk = dur_s / (dist_m / 1000); var m = Math.floor(spk / 60), s = Math.round(spk % 60);
    if (s === 60) { s = 0; m++; }
    return m + ':' + String(s).padStart(2, '0') + '/km';
  }
  function actEmoji(type) {
    type = (type || '').toLowerCase();
    if (type.indexOf('run') !== -1) return '🏃';
    if (type.indexOf('cycl') !== -1 || type.indexOf('bik') !== -1) return '🚴';
    if (type.indexOf('swim') !== -1) return '🏊';
    if (type.indexOf('walk') !== -1) return '🚶';
    if (type.indexOf('strength') !== -1 || type.indexOf('gym') !== -1) return '🏋️';
    if (type.indexOf('hik') !== -1) return '🥾';
    if (type.indexOf('yoga') !== -1) return '🧘';
    return '🏅';
  }
  function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function statTile(label, icon, valHtml, subHtml, bar) {
    var s = '<div class="g-stat"><div class="g-stat-label">' + (icon ? icon + ' ' : '') + label + '</div>' +
      '<div class="g-stat-val">' + valHtml + '</div>';
    if (subHtml) s += '<div class="g-stat-sub' + (bar && bar.good ? ' good' : '') + '">' + subHtml + '</div>';
    if (bar) s += '<div class="g-mini"><div style="width:' + clamp(bar.pct, 0, 100) + '%;background:' + bar.color + '"></div></div>';
    s += '</div>';
    return s;
  }

  function render(d, updatedAt) {
    var sub = document.getElementById('gSub');
    if (!d) { sub.textContent = 'No Garmin data yet — it syncs once a day.'; return; }
    sub.innerHTML = 'Latest full day: <b>' + fmtDateISO(d.date) + '</b> · synced ' + relTime(updatedAt || d.updated_at);

    // ----- daily snapshot -----
    var tiles = [];
    // steps
    var stepPct = (d.steps && d.steps_goal) ? d.steps / d.steps_goal * 100 : 0;
    tiles.push(statTile('Steps', '👟',
      num(d.steps),
      d.steps_goal ? ('Goal ' + num(d.steps_goal) + (d.steps >= d.steps_goal ? ' ✓' : '')) : '',
      { pct: stepPct, color: (d.steps >= d.steps_goal ? '#6BE3A4' : '#22D3EE'), good: d.steps >= d.steps_goal }));
    // resting hr
    tiles.push(statTile('Resting HR', '❤️', (d.resting_hr == null ? '—' : d.resting_hr) + ' <small>bpm</small>', ''));
    // body battery
    tiles.push(statTile('Body Battery', '🔋',
      (d.body_battery_high == null ? '—' : d.body_battery_high),
      (d.body_battery_low == null ? '' : 'Low ' + d.body_battery_low + ' · High ' + d.body_battery_high),
      (d.body_battery_high == null ? null : { pct: d.body_battery_high, color: '#6BE3A4' })));
    // stress
    var stressWord = d.stress_avg == null ? '' : (d.stress_avg < 25 ? 'Rest' : d.stress_avg < 50 ? 'Low' : d.stress_avg < 75 ? 'Medium' : 'High');
    tiles.push(statTile('Avg Stress', '🧠',
      (d.stress_avg == null ? '—' : d.stress_avg),
      stressWord,
      (d.stress_avg == null ? null : { pct: d.stress_avg, color: (d.stress_avg < 25 ? '#6BE3A4' : d.stress_avg < 50 ? '#7DD3FC' : d.stress_avg < 75 ? '#F2C063' : '#FF6B6B') })));
    // calories
    tiles.push(statTile('Calories', '🔥',
      num(d.calories) + ' <small>kcal</small>',
      d.active_calories == null ? '' : num(d.active_calories) + ' active'));
    // intensity minutes
    if (d.intensity_minutes != null || d.vigorous_minutes != null) {
      var im = (d.intensity_minutes || 0) + (d.vigorous_minutes || 0);
      tiles.push(statTile('Intensity min', '⚡', im + ' <small>min</small>',
        (d.vigorous_minutes != null ? d.vigorous_minutes + ' vigorous' : '')));
    }
    // weight (only if present)
    if (d.weight_kg != null) tiles.push(statTile('Weight', '⚖️', d.weight_kg + ' <small>kg</small>', ''));
    document.getElementById('gGrid').innerHTML = tiles.join('');

    // ----- sleep -----
    var sc = document.getElementById('gSleepCard');
    if (d.sleep_seconds) {
      var deep = d.deep_sleep_seconds || 0, rem = d.rem_sleep_seconds || 0, light = d.light_sleep_seconds || 0;
      var tot = deep + rem + light || d.sleep_seconds;
      var pd = deep / tot * 100, pr = rem / tot * 100, pl = light / tot * 100;
      var html = '<div class="g-sleep-head">' +
        '<div class="g-sleep-big">' + d.sleep_hours + ' <small>h' + (d.sleep_date && d.sleep_date !== d.date ? ' · ' + fmtDateISO(d.sleep_date) : '') + '</small></div>' +
        (d.sleep_score != null ? '<div class="g-sleep-score">Score ' + d.sleep_score + '/100</div>' : '') + '</div>' +
        '<div class="g-stages">' +
          '<div class="g-stage-deep" style="width:' + pd + '%"></div>' +
          '<div class="g-stage-rem" style="width:' + pr + '%"></div>' +
          '<div class="g-stage-light" style="width:' + pl + '%"></div></div>' +
        '<div class="g-legend">' +
          '<span><i class="g-dot g-stage-deep"></i>Deep ' + hms(deep) + '</span>' +
          '<span><i class="g-dot g-stage-rem"></i>REM ' + hms(rem) + '</span>' +
          '<span><i class="g-dot g-stage-light"></i>Light ' + hms(light) + '</span></div>';
      sc.innerHTML = html;
    } else {
      sc.innerHTML = '<div class="g-empty">No sleep data for the latest day.</div>';
    }

    // ----- activities -----
    var acts = Array.isArray(d.activities) ? d.activities : [];
    var ul = document.getElementById('gActs');
    if (!acts.length) { ul.innerHTML = '<li class="g-empty">No recent activities.</li>'; return; }
    ul.innerHTML = acts.map(function (a) {
      var km = a.distance_m ? (a.distance_m / 1000).toFixed(2) + ' km' : '—';
      var stats = [];
      stats.push('<span><b>' + km + '</b></span>');
      if (a.distance_m && a.duration_s) stats.push('<span><b>' + pace(a.distance_m, a.duration_s) + '</b></span>');
      if (a.duration_s) stats.push('<span>' + hms(a.duration_s) + '</span>');
      if (a.avg_hr) stats.push('<span>♥ ' + Math.round(a.avg_hr) + (a.max_hr ? '/' + Math.round(a.max_hr) : '') + '</span>');
      if (a.calories) stats.push('<span>' + Math.round(a.calories) + ' kcal</span>');
      return '<li class="g-act"><div class="g-act-emoji">' + actEmoji(a.type) + '</div>' +
        '<div class="g-act-main"><div class="g-act-name">' + esc(a.name || 'Activity') + '</div>' +
        '<div class="g-act-when">' + fmtActWhen(a.start) + '</div>' +
        '<div class="g-act-stats">' + stats.join('') + '</div></div></li>';
    }).join('');
  }

  // ----- load + realtime -----
  var supa = null;
  try { supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch (e) {}
  async function load() {
    if (!supa) return;
    try {
      var res = await supa.from('app_state').select('data,updated_at').eq('key', 'garmin').maybeSingle();
      if (res && res.data && res.data.data) render(res.data.data, res.data.updated_at);
      else render(null);
    } catch (e) { render(null); }
  }
  if (supa) {
    load();
    try {
      supa.channel('app_state_garmin')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'app_state', filter: 'key=eq.garmin' },
          function (payload) { if (payload.new && payload.new.data) render(payload.new.data, payload.new.updated_at); })
        .subscribe();
    } catch (e) {}
    window.addEventListener('focus', load);
  } else {
    document.getElementById('gSub').textContent = 'Could not connect to sync.';
  }
})();
</script>
</body>
</html>
